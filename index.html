<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Intelligence Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/luxon@3.4.4/build/global/luxon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.3.1"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
    <style>
        :root {
            --bg: #121212;
            --card: #1e1e1e;
            --text: #ffffff;
            --text-dim: #a0a0a0;
            --accent: #00e5ff;
            --danger: #ff5252;
            --success: #00e676;
            --border: #333;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            width: 100%;
            max-width: 1000px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }
        .pulse-info {
            font-size: 0.85rem;
            color: var(--text-dim);
            text-align: right;
        }
        .container {
            width: 100%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .card {
            background: var(--card);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 1px solid var(--border);
        }
        h1, h2, h3 { margin-top: 0; margin-bottom: 15px; }
        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.95rem;
        }
        .stat-label { color: var(--text-dim); }
        .stat-value { font-weight: bold; }
        .up { color: var(--success); }
        .down { color: var(--danger); }
        
        .controls {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn-time {
            background: #333;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: background 0.2s;
        }
        .btn-time:hover { background: #444; }
        .btn-time.active { background: var(--accent); color: black; font-weight: bold; }

        #chart-container {
            position: relative;
            width: 100%;
            height: 400px;
            margin-top: 10px;
        }
        /* Tooltip/Info Overlay positioned in the least useful space (top-right of chart area) */
        #chart-overlay {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(30, 30, 30, 0.8);
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid var(--border);
            pointer-events: none; /* User can click through to chart */
            font-size: 0.8rem;
            z-index: 10;
            display: none;
        }

        .insight-list {
            list-style: none;
            padding: 0;
            font-size: 0.9rem;
        }
        .insight-list li {
            margin-bottom: 12px;
            padding-left: 20px;
            position: relative;
        }
        .insight-list li::before {
            content: '•';
            color: var(--accent);
            position: absolute;
            left: 0;
        }

        .backtest-result {
            margin-top: 15px;
            padding: 10px;
            border-radius: 6px;
            background: rgba(0, 229, 255, 0.05);
            border: 1px dashed var(--accent);
            font-size: 0.9rem;
            text-align: center;
        }
        .instructions {
            font-size: 0.8rem;
            color: var(--text-dim);
            text-align: center;
            margin-top: -10px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="color: var(--accent); margin: 0;">Market Intelligence</h1>
        <div class="pulse-info" id="pulse-info">
            <div id="last-updated-time">Loading pulse...</div>
            <div id="market-context">Syncing...</div>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <h2 style="font-size: 1.2rem;">Macro Sentiment</h2>
            <div id="macro-content"></div>
        </div>

        <div class="card">
            <h2 style="font-size: 1.2rem;">Commodity (Lithium)</h2>
            <div id="commodity-content"></div>
        </div>

        <div class="card" style="grid-column: span 2;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2 id="target-name" style="margin: 0;">Target: Loading...</h2>
                <div id="target-price" class="stat-value">--</div>
            </div>
            <div class="controls" id="time-controls">
                <button class="btn-time" data-period="12m">12M</button>
                <button class="btn-time" data-period="6m">6M</button>
                <button class="btn-time" data-period="3m">3M</button>
                <button class="btn-time" data-period="1m">1M</button>
                <button class="btn-time" data-period="7d">7D</button>
                <button class="btn-time" data-period="3d">3D</button>
                <button class="btn-time active" data-period="24h">24H</button>
            </div>
            <p class="instructions">Click two points on the line to simulate a trade.</p>
            <div id="chart-container">
                <canvas id="priceChart"></canvas>
                <div id="chart-overlay"></div>
            </div>
            <div id="backtest-panel" class="backtest-result" style="display:none"></div>
        </div>

        <div class="card">
            <h2 style="font-size: 1.2rem;">Intelligence Insights</h2>
            <ul class="insight-list" id="insight-list"></ul>
        </div>
    </div>

    <script>
        let marketData = {};
        let priceChart = null;
        let selectedPoints = [];

        async function init() {
            try {
                const res = await fetch('market_data.json');
                marketData = await res.json();
                renderPulseInfo();
                renderMacro();
                renderCommodity();
                renderTargetInfo();
                initChart();
            } catch (err) {
                console.error("Failed to load data:", err);
            }
        }

        function renderPulseInfo() {
            const meta = marketData.metadata;
            document.getElementById('last-updated-time').textContent = `Last Pulse: ${meta.last_pulse.timestamp || meta.last_pulse.utc}`;
            document.getElementById('market-context').textContent = `ASX: ${meta.markets.ASX.location} (${meta.markets.ASX.timezone})`;
        }

        function renderMacro() {
            const macro = marketData.market_intelligence.macro_sentiment;
            let html = '';
            for (const [key, val] of Object.entries(macro)) {
                html += `<div class="stat-row"><span class="stat-label">${key.toUpperCase()}</span><span class="stat-value">${val}</span></div>`;
            }
            document.getElementById('macro-content').innerHTML = html;
        }

        function renderCommodity() {
            const lithium = marketData.commodity_intelligence.lithium;
            document.getElementById('commodity-content').innerHTML = `
                <div class="stat-row"><span class="stat-label">Spot (CNY)</span><span class="stat-value">${lithium.spot_price_cny}</span></div>
                <div class="stat-row"><span class="stat-label">Daily Change</span><span class="stat-value ${lithium.daily_change_pct >= 0 ? 'up' : 'down'}">${lithium.daily_change_pct}%</span></div>
                <div class="stat-row"><span class="stat-label">Trend</span><span class="stat-value">${lithium.trend}</span></div>
                <hr style="border:0; border-top:1px solid var(--border); margin:10px 0;">
                <ul style="font-size:0.8rem; color:var(--text-dim); padding-left:20px;">
                    ${lithium.signals.map(s => `<li>${s}</li>`).join('')}
                </ul>
            `;
        }

        function renderTargetInfo() {
            const asset = marketData.asset_intelligence;
            document.getElementById('target-name').textContent = `Target: ${asset.target}`;
            document.getElementById('target-price').textContent = `$${asset.current_metrics.price}`;
            document.getElementById('target-price').className = `stat-value ${asset.current_metrics.change_24h.startsWith('+') ? 'up' : 'down'}`;
            
            const insights = document.getElementById('insight-list');
            insights.innerHTML = `
                <li><strong>Divergence:</strong> ${asset.divergence.description}</li>
                <li><strong>Status:</strong> <span class="${asset.current_metrics.status.includes('ALERT') ? 'down' : 'up'}">${asset.current_metrics.status}</span></li>
            `;
        }

        function initChart() {
            const ctx = document.getElementById('priceChart').getContext('2d');
            priceChart = new Chart(ctx, {
                type: 'line',
                data: { datasets: [] },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    onClick: (evt, elements) => handleChartClick(evt, elements),
                    scales: {
                        x: { 
                            type: 'time', 
                            time: { unit: 'day' }, 
                            grid: { 
                                display: true,
                                color: 'rgba(0, 229, 255, 0.05)',
                                borderDash: [5, 5]
                            }, 
                            ticks: { color: '#a0a0a0' } 
                        },
                        y: { 
                            position: 'right', 
                            grid: { color: '#333' }, 
                            ticks: { color: '#a0a0a0' } 
                        }
                    },
                    plugins: {
                        legend: { display: true, labels: { color: '#a0a0a0', boxWidth: 12 } },
                        tooltip: { mode: 'index', intersect: false },
                        annotation: {
                            annotations: {}
                        }
                    },
                    interaction: { mode: 'index', intersect: false }
                }
            });
            updateChart('24h');
        }

        function handleChartClick(evt, elements) {
            if (!elements.length) return;
            const element = elements[0];
            const datasetIndex = element.datasetIndex;
            if (datasetIndex !== 0) return;

            const index = element.index;
            const label = priceChart.data.labels[index];
            const val = priceChart.data.datasets[0].data[index].y || priceChart.data.datasets[0].data[index];

            if (selectedPoints.length < 2) {
                selectedPoints.push({ x: label, y: val, index: index });
            } else {
                selectedPoints.shift();
                selectedPoints.push({ x: label, y: val, index: index });
            }

            renderSelectionHighlights();
            if (selectedPoints.length === 2) {
                // Enforce logic: buy MUST be before sell
                if (selectedPoints[0].x > selectedPoints[1].x) {
                    // Swap them so index 0 is the earlier timestamp
                    [selectedPoints[0], selectedPoints[1]] = [selectedPoints[1], selectedPoints[0]];
                }
                calculateBacktest();
            } else {
                document.getElementById('backtest-panel').style.display = 'none';
            }
        }

        function renderSelectionHighlights() {
            priceChart.options.plugins.annotation.annotations = {};
            selectedPoints.forEach((pt, i) => {
                const color = i === 0 ? '#00e5ff' : '#ff5252';
                const label = i === 0 ? 'Entry' : 'Exit';
                priceChart.options.plugins.annotation.annotations[`point${i}`] = {
                    type: 'point',
                    xValue: pt.x,
                    yValue: pt.y,
                    backgroundColor: color,
                    radius: 6,
                    borderWidth: 2,
                    borderColor: '#fff',
                    label: {
                        display: true,
                        content: label,
                        position: 'top',
                        backgroundColor: color,
                        color: '#000',
                        font: { size: 10, weight: 'bold' }
                    }
                };
            });
            priceChart.update();
        }

        function calculateBacktest() {
            const [p1, p2] = selectedPoints;
            const startPrice = p1.y;
            const endPrice = p2.y;
            const pctChange = ((endPrice - startPrice) / startPrice * 100).toFixed(2);
            const isProfit = pctChange >= 0;
            
            const panel = document.getElementById('backtest-panel');
            panel.style.display = 'block';
            panel.className = `backtest-result ${isProfit ? 'up' : 'down'}`;
            panel.innerHTML = `
                <strong>${isProfit ? '✅ Profit' : '❌ Loss'}</strong> 
                Bought at <span class="stat-value">$${startPrice.toFixed(2)}</span>, 
                Sold at <span class="stat-value">$${endPrice.toFixed(2)}</span> 
                <br>
                <span style="font-size: 1.2rem; font-weight: bold;">
                    ${isProfit ? '+' : ''}${pctChange}%
                </span>
            `;
        }

        function updateChart(period) {
            selectedPoints = [];
            document.getElementById('backtest-panel').style.display = 'none';
            
            const history = marketData.asset_intelligence.historical_data.target;
            let filteredData = [...history];
            const now = new Date();

            if (period === '7d') filteredData = history.filter(d => new Date(d.t) > new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000));
            else if (period === '3d') filteredData = history.filter(d => new Date(d.t) > new Date(now.getTime() - 3 * 24 * 60 * 60 * 1000));
            else if (period === '24h') filteredData = history.filter(d => new Date(d.t) > new Date(now.getTime() - 24 * 60 * 60 * 1000));
            else if (period === '1m') filteredData = history.filter(d => new Date(d.t) > new Date(now.getTime() - 30 * 24 * 60 * 60 * 1000));
            else if (period === '3m') filteredData = history.filter(d => new Date(d.t) > new Date(now.getTime() - 90 * 24 * 60 * 60 * 1000));
            else if (period === '6m') filteredData = history.filter(d => new Date(d.t) > new Date(now.getTime() - 180 * 24 * 60 * 60 * 1000));
            else if (period === '12m') filteredData = history;

            const prices = filteredData.map(d => d.p);
            const labels = filteredData.map(d => d.t);

            const pMin = Math.min(...prices);
            const pMax = Math.max(...prices);
            const range = pMax - pMin;
            const padding = range / 3;
            
            // Adaptive Y-Axis Scaling logic
            const yMin = pMin - padding;
            const yMax = pMax + padding;

            const trendUp = prices[prices.length - 1] >= prices[0];
            const trendColor = trendUp ? '#00e676' : '#ff5252';

            const windowSize = 7;
            const rollingAvg = [];
            const rolling10 = [];
            const rolling90 = [];
            const intersections = [];

            for (let i = 0; i < prices.length; i++) {
                const start = Math.max(0, i - windowSize);
                const window = prices.slice(start, i + 1);
                const sorted = [...window].sort((a, b) => a - b);
                
                rollingAvg.push(window.reduce((a, b) => a + b, 0) / window.length);
                rolling10.push(sorted[Math.floor(sorted.length * 0.1)]);
                rolling90.push(sorted[Math.floor(sorted.length * 0.9)]);

                if (i > 0) {
                    const currP = prices[i];
                    const prevP = prices[i-1];
                    if ((prevP <= rolling10[i] && currP >= rolling10[i]) || (prevP >= rolling10[i] && currP <= rolling10[i]) ||
                        (prevP <= rolling90[i] && currP >= rolling90[i]) || (prevP >= rolling90[i] && currP <= rolling90[i])) {
                        intersections.push({ x: labels[i], y: currP });
                    }
                }
            }

            priceChart.data.labels = labels;
            priceChart.data.datasets = [
                {
                    label: 'Price',
                    data: prices,
                    borderColor: trendColor,
                    borderWidth: 3,
                    pointRadius: 0,
                    tension: 0.2,
                    z: 10
                },
                {
                    label: '90% High',
                    data: rolling90,
                    borderColor: 'rgba(0, 230, 255, 0.3)',
                    backgroundColor: 'rgba(0, 230, 255, 0.1)',
                    borderWidth: 1,
                    pointRadius: 0,
                    fill: '+1' 
                },
                {
                    label: '10% Low',
                    data: rolling10,
                    borderColor: 'rgba(0, 230, 255, 0.3)',
                    backgroundColor: 'rgba(0, 230, 255, 0.1)',
                    borderWidth: 1,
                    pointRadius: 0,
                    fill: false
                },
                {
                    label: 'Average',
                    data: rollingAvg,
                    borderColor: 'rgba(255, 255, 255, 0.4)',
                    borderDash: [5, 5],
                    pointRadius: 0,
                    fill: false
                },
                {
                    label: 'Predictive',
                    data: prices.map(p => p * (1 + (Math.random() * 0.04 - 0.02))),
                    borderColor: '#ff00ff',
                    borderWidth: 1,
                    borderDash: [2, 2],
                    pointRadius: 0,
                    fill: false
                },
                {
                    label: 'Intersections',
                    data: intersections,
                    borderColor: '#ffffff',
                    backgroundColor: '#ffffff',
                    pointRadius: 4,
                    showLine: false,
                    type: 'scatter'
                }
            ];
            priceChart.options.scales.y.min = yMin;
            priceChart.options.scales.y.max = yMax;
            priceChart.update();
        }

        document.getElementById('time-controls').addEventListener('click', (e) => {
            if (e.target.classList.contains('btn-time')) {
                document.querySelectorAll('.btn-time').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                updateChart(e.target.dataset.period);
            }
        });

        init();
    </script>
</body>
</html>
